# > 「GeoLite2」数据源（任选其一，默认启用 Hackl0us 维护的中国优化版）
# https://raw.githubusercontent.com/Loyalsoldier/geoip/release/Country.mmdb
# https://github.com/Hackl0us/GeoIP2-CN/raw/release/Country.mmdb

[general]
# 节点可用性测试网址
server_check_url=http://www.gstatic.com/generate_204

# 阻止 QUIC 协议引起的测速或分流不准（丢弃 443 端口的 UDP 流量）
udp_drop_list=443

# 服务器测试超时时间 (毫秒)
server_check_timeout=2000

# 排除路由，不经过 QuantumultX 处理
excluded_routes=10.0.0.0/8, 127.0.0.0/8, 169.254.0.0/16, 192.0.2.0/24, 192.168.0.0/16, 198.51.100.0/24, 224.0.0.0/4

# 获取、展示节点信息的面板脚本
geo_location_checker=http://ip-api.com/json/?lang=zh-CN, https://raw.githubusercontent.com/KOP-XIAO/QuantumultX/master/Scripts/IP_API.js

# 资源解析器（用于转换各类非标准订阅）
resource_parser_url=https://raw.githubusercontent.com/KOP-XIAO/QuantumultX/master/Scripts/resource-parser.js

# 配置文件路径显示头像
profile_img_url=https://raw.githubusercontent.com/Orz-3/mini/master/Color/sub.png

# 未匹配 UDP 流量的默认降级策略
fallback_udp_policy=direct

[dns]
# 并发查询国内外优质 DNS
server=223.5.5.5
server=119.29.29.29
server=8.8.8.8
server=1.1.1.1

# 强制国外特定服务走远程加密解析，防止本地污染
server=/*.google.com/8.8.8.8
server=/*.youtube.com/8.8.8.8
server=/*.facebook.com/1.1.1.1
server=/*.twitter.com/1.1.1.1
server=/*.telegram.org/1.1.1.1

[policy]
# static: 手动选择 / url-latency-benchmark: 自动测速
static=广告拦截, reject, direct, img-url=https://raw.githubusercontent.com/Orz-3/mini/master/Color/Adblock.png
static=苹果服务, direct, proxy, Top1, 香港, 台湾, 日本, 美国, 新加坡, img-url=https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Apple_2.png
static=YouTube, proxy, Top1, 香港, 台湾, 日本, 美国, 新加坡, img-url=https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/YouTube.png
static=YouTubeMusic, proxy, Top1, 香港, 台湾, 日本, 美国, 新加坡, img-url=https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/YouTube_Music.png
static=TikTok, proxy, Top1, 台湾, 日本, 美国, 新加坡, 韩国, img-url=https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/TikTok.png
static=Netflix, proxy, Top1, 香港, 台湾, 日本, 美国, 新加坡, 韩国, img-url=https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Netflix_Letter.png
static=Telegram, proxy, Top1, 香港, 台湾, 日本, 美国, 新加坡, img-url=https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Telegram.png
static=Instagram, proxy, Top1, 香港, 台湾, 日本, 美国, 新加坡, img-url=https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Instagram.png
static=Twitter, proxy, Top1, 香港, 台湾, 日本, 美国, 新加坡, img-url=https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Twitter.png
static=Facebook, proxy, Top1, 香港, 台湾, 日本, 美国, 新加坡, img-url=https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Facebook.png
static=Spotify, proxy, direct, Top1, 香港, 台湾, 日本, 美国, 新加坡, img-url=https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Spotify.png
static=游戏加速, proxy, direct, Top1, 香港, 台湾, 日本, 韩国, 美国, img-url=https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Game.png
static=国外IP, proxy, Top1, 香港, 台湾, 日本, 美国, 新加坡, img-url=https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Global.png
static=国内IP, direct, proxy, img-url=https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/China.png
static=港澳番剧, proxy, 香港, 台湾, img-url=https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Bahamut.png
# FINAL 漏网之鱼策略
static=黑白名单, proxy, direct, reject, Top1, 香港, 日本, 美国, img-url=https://raw.githubusercontent.com/Orz-3/mini/master/Color/Final.png

# >>>>>>>>> 自动化测速与正则节点筛选
url-latency-benchmark=Top1, server-tag-regex=^((?!(加群|套餐|重置|分享|网址|邀请|公众|消息|账号|邮箱|联系|时间|频道|Unblock)).)*$, check-interval=600, tolerance=20, img-url=https://raw.githubusercontent.com/Semporia/Hand-Painted-icon/master/Universal/Auto_Speed.png
url-latency-benchmark=香港, server-tag-regex=(?=.*(香港|港|HK|(?i)HongKong)), check-interval=600, tolerance=20, img-url=https://raw.githubusercontent.com/Orz-3/mini/master/Color/HK.png
url-latency-benchmark=台湾, server-tag-regex=(?=.*(台湾|台|TW|(?i)Taiwan)), check-interval=600, tolerance=20, img-url=https://raw.githubusercontent.com/Orz-3/mini/master/Color/TW.png
url-latency-benchmark=日本, server-tag-regex=(?=.*(日本|日|JP|(?i)Japan)), check-interval=600, tolerance=20, img-url=https://raw.githubusercontent.com/Orz-3/mini/master/Color/JP.png
url-latency-benchmark=韩国, server-tag-regex=(?=.*(KR|Korea|KOR|首尔|韩|韓)), check-interval=600, tolerance=50, img-url=https://raw.githubusercontent.com/Orz-3/mini/master/Color/KR.png
url-latency-benchmark=美国, server-tag-regex=(?=.*(美国|美|US|(?i)States|American)), check-interval=600, tolerance=50, img-url=https://raw.githubusercontent.com/Orz-3/mini/master/Color/US.png
url-latency-benchmark=新加坡, server-tag-regex=(?=.*(新加坡|新|狮城|SG|(?i)Singapore)), check-interval=600, tolerance=30, img-url=https://raw.githubusercontent.com/Orz-3/mini/master/Color/SG.png

